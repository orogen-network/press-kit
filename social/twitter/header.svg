<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500" role="img" aria-label="Orogen header">
  <title>Orogen header banner</title>
  <desc>Orogen nested-strata mark and wordmark centered on crust-950 with faint copper/mineral radial wash, tagline beneath, site URL in mono.</desc>
  <defs>
    <radialGradient id="copper" cx="0.16" cy="0.08" r="0.9">
      <stop offset="0" stop-color="#C8753B" stop-opacity="0.12"/>
      <stop offset="0.6" stop-color="#C8753B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="emer" cx="0.86" cy="0.96" r="0.9">
      <stop offset="0" stop-color="#2AB67D" stop-opacity="0.09"/>
      <stop offset="0.6" stop-color="#2AB67D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1500" height="500" fill="#0b0d10"/>
  <rect width="1500" height="500" fill="url(#copper)"/>
  <rect width="1500" height="500" fill="url(#emer)"/>

  <g transform="translate(482,126) scale(1.45)">
    <path d="M24 38C40 38 50 29 64 26C78 29 88 38 104 38" fill="none" stroke="#F5F7F8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M20 56C38 56 49 47 64 44C79 47 90 56 108 56" fill="none" stroke="#F5F7F8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M18 74C37 74 49 64 64 61C79 64 91 74 110 74" fill="none" stroke="#F5F7F8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M24 92C41 92 52 82 64 78C76 82 87 92 104 92" fill="none" stroke="#F5F7F8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M64 28V92" stroke="#2AB67D" stroke-width="8" stroke-linecap="round"/>
    <circle cx="64" cy="28" r="6" fill="#2AB67D"/>
    <circle cx="64" cy="61" r="5" fill="#2AB67D"/>
    <circle cx="64" cy="92" r="6" fill="#2AB67D"/>
  </g>
  <text x="704" y="248" font-family="Inter" font-weight="700" font-size="104" letter-spacing="-1.5" fill="#e9ebef">Orogen</text>

  <!-- tagline -->
  <text x="750" y="322" text-anchor="middle" font-family="Inter" font-weight="500" font-size="30" letter-spacing="0.2" fill="#aeb6c2">Verifiable LLM inference, anchored to physical work.</text>

  <!-- site -->
  <text x="750" y="366" text-anchor="middle" font-family="JetBrains Mono" font-weight="500" font-size="22" letter-spacing="1" fill="#2AB67D">orogen.network</text>
