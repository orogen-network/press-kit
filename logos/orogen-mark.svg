<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Orogen mark">
  <title>Orogen mark</title>
  <desc>Crystalline mountain — five-point ridge in magma amber with inner emerald ridge. Transparent background.</desc>
  <!--
    Source path data (favicon.svg, viewBox 0 0 64):
      outer  M6 50 L22 22 L30 34 L40 14 L58 50 Z
      base   line 6,50 → 58,50
      inner  M22 22 L30 34 L40 14
    Re-centered into a 1024 canvas with ≈14% clearspace on every side
    (clearspace half the mark height).
    Scale factor 14.1785× preserves the favicon's stroke weight at large sizes
    (outer 2.6→36.86; inner 1.4→19.85).
  -->
  <g transform="translate(58.29 58.29) scale(14.1785)">
    <path
      d="M6 50 L22 22 L30 34 L40 14 L58 50 Z"
      fill="none"
      stroke="#f59e0b"
      stroke-width="2.6"
      stroke-linejoin="miter"
      stroke-miterlimit="10"
    />
    <line
      x1="6" y1="50" x2="58" y2="50"
      stroke="#f59e0b"
      stroke-width="2.6"
    />
    <path
      d="M22 22 L30 34 L40 14"
      fill="none"
      stroke="#34d399"
      stroke-width="1.4"
      stroke-linejoin="miter"
      stroke-miterlimit="10"
    />
  </g>
</svg>
